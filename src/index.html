<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>3D Islands Project</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/src/css/main.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Albert+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- ===================== -->
    <!-- SIDE MENU -->
    <!-- ===================== -->
    <div id="sideMenu">
      <span id="menu-accueil" class="label active">Accueil</span>
      <span id="menu-collection" class="label">Collection</span>
      <span id="menu-iris" class="label">Iris Van Herpen</span>
      <span id="menu-oceanix" class="label">Oceanix</span>
    </div>

    <!-- ===================== -->
    <!-- CONTAINER FOR INFO BUTTONS (JS inserts them here) -->
    <!-- ===================== -->
    <div id="info-buttons"></div>

    <!-- ===================== -->
    <!-- OVERLAY -->
    <!-- ===================== -->
    <div id="info-overlay">
      <div id="overlay-content">
        <h2 id="overlay-title"></h2>
        <p id="overlay-text"></p>
        <button id="overlay-close">Fermer</button>
      </div>
    </div>

    <!-- ===================== -->
    <!-- IMPORTMAP -->
    <!-- ===================== -->
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.157.0/build/three.module.js",
          "three/examples/jsm/": "https://unpkg.com/three@0.157.0/examples/jsm/"
        }
      }
    </script>

    <!-- ===================== -->
    <!-- MAIN JS -->
    <!-- ===================== -->
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
